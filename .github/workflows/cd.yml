name: Prism CD

on:
  workflow_run:
    workflows: ["Prism CI"]
    types: [completed]
    # branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'pull_request') &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          script: |
            cd ~/prism
            git checkout main
            git pull origin main
            docker compose -f compose-prod.yml pull

            # Start DB first and wait for it to be healthy
            docker compose -f compose-prod.yml up -d db
            docker compose -f compose-prod.yml exec db sh -c 'until pg_isready; do sleep 1; done'

            # Run Prisma migrations via one-off soul.prism container
            docker compose -f compose-prod.yml run --rm soul.prism bunx prisma migrate deploy

            # Bring up all services
            docker compose -f compose-prod.yml up -d
            docker image prune -f