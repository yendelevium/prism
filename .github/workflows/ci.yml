name: Prism CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  format-and-test:
    name: Format & test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Go Environment
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache: true
          cache-dependency-path: intercept.prism/go.sum

      # Setup Bun Environment
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Install Dependencies
      - name: Install Dependencies
        run: |
          echo "Installing Go deps..."
          cd intercept.prism && go mod download
          
          echo "Installing Frontend deps..."
          cd ../soul.prism && bun install --frozen-lockfile

      # Formatter Checks
      # We verify formatting instead of fixing it. If this fails, the PR is blocked.
      - name: Verify Formatting
        run: |
          echo "Checking code formatting"
          make format

          # If there were any changes after formatting -> code wasn't formatted, exit with failure
          git diff --exit-code

      # Run Tests (fails if it fails)
      - name: Run Tests
        run: make test  

  docker-build-test:
    name: Docker build test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker Build (Dry Run)
      # This confirms your Dockerfiles are valid and context paths are correct
      - name: Build Docker Images
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: make build

  docker-build-and-push:
    name: Docker image build and push
    needs: docker-build-test

    # ONLY on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx is Docker's advanced build engine, great for CI environments

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push intercept.prism
        uses: docker/build-push-action@v5
        with:
          context: ./intercept.prism
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/intercept-prism:latest

      - name: Build and push soul.prism
        uses: docker/build-push-action@v5
        with:
          context: ./soul.prism
          push: true
          target: runner
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/soul-prism:latest
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}